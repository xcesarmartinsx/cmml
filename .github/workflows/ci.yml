# =============================================================================
# CI Pipeline — Projeto CMML
# =============================================================================
# Executa em push (qualquer branch) e pull_request (qualquer branch).
# Jobs: lint, test (paralelos), build-api (depende dos anteriores).
# Secrets de banco NUNCA hardcoded — usar GitHub Secrets quando necessario.
# =============================================================================

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -- Lint (ruff) ------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting (ruff format)
        run: ruff format --check --diff etl/ ml/ app/api/

      - name: Lint (ruff check)
        run: |
          ruff check etl/ ml/ app/api/ \
            --select=E,F,W \
            --line-length=120 \
            --output-format=github

  # -- Test (pytest) ----------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    env:
      PG_HOST: ${{ secrets.PG_HOST || 'localhost' }}
      PG_PORT: ${{ secrets.PG_PORT || '5432' }}
      PG_DB: ${{ secrets.PG_DB || 'reco' }}
      PG_USER: ${{ secrets.PG_USER || 'reco' }}
      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r app/api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(find tests -name 'test_*.py' -o -name '*_test.py' | head -1)" ]; then
            pytest tests/ -v --tb=short --co -q 2>/dev/null | head -5
            pytest tests/ -v --tb=short
          else
            echo "::warning::No tests found in tests/ — skipping. Add tests to enable this check."
          fi

  # -- Build API (docker build, no push) --------------------------------------
  build-api:
    name: Build API Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build reco-api image
        run: docker build -t cmml-api:ci ./app/api
